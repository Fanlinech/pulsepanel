name: pulsepanel

services:
  postgres:
    image: postgres:16
    container_name: pulsepanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulsepanel}
      POSTGRES_USER: ${POSTGRES_USER:-pulsepanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsepanel_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pulsepanel-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pulsepanel-postgres-data:
